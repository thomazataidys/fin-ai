version: '3.8'
services:
  db:
    image: postgres:16
    container_name: postgres-next
    restart: always
    environment:
      POSTGRES_USER: finai
      POSTGRES_PASSWORD: finai
      POSTGRES_DB: finai
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
